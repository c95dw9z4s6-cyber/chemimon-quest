name: Verify package and deploy Chemion Quest

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Verify one-file release and build a fresh site directory
        run: |
          rm -rf _site
          python3 scripts/verify_release_package.py chemion-release.zip --extract-to _site --json | tee release-verification.json

      - name: Publish verification summary
        run: |
          python3 - <<'PY'
          import json, os
          result = json.load(open('release-verification.json', encoding='utf-8'))
          summary = os.environ['GITHUB_STEP_SUMMARY']
          with open(summary, 'a', encoding='utf-8') as out:
              out.write(f"# Chemion Quest v{result['version']}\n\n")
              out.write(f"- Build ID: `{result['buildId']}`\n")
              out.write(f"- Package SHA-256: `{result['packageSha256']}`\n")
              out.write(f"- Verified files: {result['fileCount']}\n")
              out.write(f"- Verified bytes: {result['totalBytes']}\n")
              out.write("- Deployment source: fresh directory extracted only after all checks passed\n")
          PY

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload verified Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - name: Deploy verified release
        id: deployment
        uses: actions/deploy-pages@v4
